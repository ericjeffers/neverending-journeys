<div class="max-w-3xl mx-auto py-10 px-4">
  @if (loading()) {
    <div class="text-center py-20 text-gray-400 text-xl">Loading post...</div>
  } @else if (!post()) {
    <div class="text-center py-20 text-gray-400">
      <p class="text-2xl mb-2">Post not found.</p>
      <a routerLink="/blog" class="text-yellow-400 hover:underline">← Back to Blog</a>
    </div>
  } @else {
    <a routerLink="/blog" class="text-yellow-400 hover:underline text-sm mb-6 inline-block">← Back to Blog</a>

    <div class="w-full rounded-xl overflow-hidden mb-6 max-h-96">
      <img [src]="post()!.image || defaultImage"
           [alt]="post()!.title"
           class="w-full h-full object-cover" />
    </div>

    <h1 class="text-4xl font-bold mb-2 text-white">{{ post()!.title }}</h1>
    <p class="text-gray-400 text-sm mb-8">{{ post()!.date }}</p>
    <div class="text-gray-200 leading-relaxed whitespace-pre-wrap">{{ post()!.content }}</div>
  }
</div>
