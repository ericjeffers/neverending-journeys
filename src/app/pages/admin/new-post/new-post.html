<div class="max-w-3xl mx-auto py-10 px-4">
  <h1 class="text-4xl font-bold mb-2">✍️ New Blog Post</h1>
  <p class="text-gray-400 mb-8">Write your post below. It will be saved directly to your GitHub repo.</p>

  @if (success()) {
    <div class="bg-green-900 bg-opacity-50 border border-green-500 text-green-200 rounded-lg px-4 py-3 mb-6">
      🎉 Post published! It will appear on the blog shortly.
      <a routerLink="/blog" class="text-yellow-400 hover:underline ml-2">View Blog →</a>
    </div>
  }

  @if (error()) {
    <div class="bg-red-900 bg-opacity-50 border border-red-500 text-red-200 rounded-lg px-4 py-3 mb-6">
      Something went wrong. Check your token permissions and try again.
    </div>
  }

  <div class="space-y-5">
    <div>
      <label class="block text-sm font-semibold text-gray-300 mb-1">Title</label>
      <input
        type="text"
        [(ngModel)]="title"
        placeholder="Our Magical Week at Walt Disney World"
        class="w-full bg-white bg-opacity-10 border border-white border-opacity-20 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-400 transition-colors"
      />
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-300 mb-1">Excerpt <span class="text-gray-500 font-normal">(short summary shown on blog listing)</span></label>
      <input
        type="text"
        [(ngModel)]="excerpt"
        placeholder="A brief summary of your post..."
        class="w-full bg-white bg-opacity-10 border border-white border-opacity-20 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-400 transition-colors"
      />
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-300 mb-1">Content</label>
      <textarea
        [(ngModel)]="content"
        rows="16"
        placeholder="Write your blog post here..."
        class="w-full bg-white bg-opacity-10 border border-white border-opacity-20 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-400 transition-colors resize-y font-mono text-sm"
      ></textarea>
    </div>

    <button
      (click)="publish()"
      [disabled]="loading() || !title.trim() || !content.trim()"
      class="w-full bg-yellow-400 hover:bg-yellow-300 text-gray-900 font-bold py-3 rounded-lg transition-colors duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
      {{ loading() ? 'Publishing...' : '🚀 Publish Post' }}
    </button>
  </div>
</div>
