<div class="max-w-md mx-auto py-20 px-4">
  <div class="bg-white bg-opacity-5 border border-white border-opacity-10 rounded-2xl p-8">
    <h1 class="text-3xl font-bold mb-2">Admin Login</h1>
    <p class="text-gray-400 text-sm mb-6">
      Enter your GitHub Personal Access Token to manage blog posts.
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=NeverendingJourneys" target="_blank"
         class="text-yellow-400 hover:underline">Generate one here</a> (needs <code>repo</code> scope).
    </p>

    @if (error()) {
      <div class="bg-red-900 bg-opacity-50 border border-red-500 text-red-200 rounded-lg px-4 py-3 mb-4 text-sm">
        Invalid token. Please check and try again.
      </div>
    }

    <div class="space-y-4">
      <input
        type="password"
        [(ngModel)]="tokenInput"
        placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
        class="w-full bg-white bg-opacity-10 border border-white border-opacity-20 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-400 transition-colors"
      />
      <button
        (click)="login()"
        [disabled]="loading()"
        class="w-full bg-yellow-400 hover:bg-yellow-300 text-gray-900 font-bold py-3 rounded-lg transition-colors duration-300 disabled:opacity-50">
        {{ loading() ? 'Verifying...' : 'Login' }}
      </button>
    </div>

    <p class="text-gray-500 text-xs mt-4">Your token is stored only in your browser session and is never sent anywhere except GitHub's API.</p>
  </div>
</div>
